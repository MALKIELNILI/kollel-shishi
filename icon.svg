<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#b8973a"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  <circle cx="50" cy="50" r="47" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Open book -->
  <path d="M20 35 Q35 30 50 35 Q65 30 80 35 L80 68 Q65 63 50 68 Q35 63 20 68 Z" fill="url(#gold)" opacity="0.95"/>
  <line x1="50" y1="35" x2="50" y2="68" stroke="#1e3a8a" stroke-width="1.5"/>
  <!-- Book lines left -->
  <line x1="26" y1="43" x2="46" y2="41" stroke="#1e3a8a" stroke-width="1.2" opacity="0.6"/>
  <line x1="26" y1="49" x2="46" y2="47" stroke="#1e3a8a" stroke-width="1.2" opacity="0.6"/>
  <line x1="26" y1="55" x2="46" y2="53" stroke="#1e3a8a" stroke-width="1.2" opacity="0.6"/>
  <line x1="26" y1="61" x2="38" y2="60" stroke="#1e3a8a" stroke-width="1.2" opacity="0.6"/>
  <!-- Book lines right -->
  <line x1="54" y1="41" x2="74" y2="43" stroke="#1e3a8a" stroke-width="1.2" opacity="0.6"/>
  <line x1="54" y1="47" x2="74" y2="49" stroke="#1e3a8a" stroke-width="1.2" opacity="0.6"/>
  <line x1="54" y1="53" x2="74" y2="55" stroke="#1e3a8a" stroke-width="1.2" opacity="0.6"/>
  <line x1="54" y1="60" x2="66" y2="61" stroke="#1e3a8a" stroke-width="1.2" opacity="0.6"/>
  <!-- Coin -->
  <circle cx="73" cy="27" r="13" fill="#fbbf24" stroke="#b8973a" stroke-width="1.5"/>
  <circle cx="73" cy="27" r="10" fill="none" stroke="#b8973a" stroke-width="0.8"/>
  <text x="73" y="32" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1e3a8a">₪</text>
  <!-- Bottom label -->
  <text x="50" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#fde68a">כולל שישי</text>
</svg>
